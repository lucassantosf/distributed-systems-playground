services:
  # ==================== User Service ====================
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8001:8000"
      - "50051:50051"
    env_file:
      - ./user-service/.env
    volumes:
      - ./user-service/app:/app
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - microservices-net

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_db
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # ==================== Product Service ====================
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8002:8000"
      - "50052:50052"
    env_file:
      - ./product-service/.env
    volumes:
      - ./product-service/app:/app
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - microservices-net

  product-db:
    image: postgres:16-alpine
    container_name: product-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: product_db
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # ==================== Order Service ====================
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8003:8000"
    env_file:
      - ./order-service/.env
    volumes:
      - ./order-service/app:/app
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-db:
        condition: service_healthy
    networks:
      - microservices-net

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: order_db
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  user-db-data:
  product-db-data:
  order-db-data:
