syntax = "proto3";

package order;

option java_multiple_files = true;
option java_package = "com.playground.order";

message OrderItem {
    string product_id = 1;
    int32 quantity = 2;
}

message Order {
    string id = 1;
    string user_id = 2;
    repeated OrderItem items = 3;
    string total_price = 4;
    string status = 5;
    string created_at = 6;
    string updated_at = 7;
}

message CreateOrderRequest {
    string user_id = 1;
    repeated OrderItem items = 2;
}

message GetOrderRequest {
    string id = 1;
}

message ListOrdersByUserRequest {
    string user_id = 1;
}

message ListOrdersByUserResponse {
    repeated Order orders = 1;
}

service OrderService {
    rpc CreateOrder (CreateOrderRequest) returns (Order);
    rpc GetOrder (GetOrderRequest) returns (Order);
    rpc ListOrdersByUser (ListOrdersByUserRequest) returns (ListOrdersByUserResponse);
}
