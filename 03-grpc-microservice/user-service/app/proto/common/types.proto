syntax = "proto3";

package common;

option java_multiple_files = true;
option java_package = "com.playground.common";

message Pagination {
    int32 page = 1;
    int32 per_page = 2;
}

message PaginationResponse {
    int32 total = 1;
    int32 page = 2;
    int32 per_page = 3;
    int32 total_pages = 4;
}
